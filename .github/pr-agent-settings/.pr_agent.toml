[config] # in configuration.toml
model="gemini/gemini-2.5-flash"
fallback_models=["gemini/gemini-2.5-flash"]
ignore_file_and_folder_filter = [
    "node_modules/*",
    "target/*",
    "**/*.xml",          # 忽略 AEM 的 content.xml 等檔案
    "**/*.json",         # 如果不想審查大型 json 檔案
    "dist/*",
    "**/*.test.ts"       # 忽略測試檔
]

[pr_agent]
fallback_language = "zh-TW"

[pr_reviewer]
# --- 代碼審查規則 (Review) ---
include_file_filter = [
    "ui.frontend/src/**"     # 前端 React/TS 路徑
]
inline_code_comments = true
num_code_suggestions = 10

extra_instructions = """
你現在的角色是嚴格的代碼審查官。請『逐行』核對代碼是否符合以下規範，若有違反請務必使用 inline comment 指出：

## 1. 命名規範 (Naming) - 強制執行
- **變數、函式、物件屬性**: 必須檢查是否為 camelCase（小駝峰）。若發現大寫開頭或底線命名，請指正。
- **React 元件與檔案名稱**: 必須檢查是否為 PascalCase（大駝峰）。
- **常數**: 必須檢查是否為 SCREAMING_SNAKE_CASE（全大寫加底線）。

## 2. 代碼品質要求
- 禁止使用魔術數字：如發現硬編碼的數字（如 80, 100），請要求改為具名常數。
- 檢查重複內容：若發現檔案內容高度重複（如 CustomAccordionWarning.tsx 與 customtest.tsx），請務必在 Review 中要求重構或刪除。

## 3. 語言與格式
- 所有的評論、建議、標題請『一律使用繁體中文』。
"""


[pr_description]
# --- PR 描述生成規則 (Describe) ---
# 將自動生成的摘要發佈為 PR 留言
publish_description_as_comment = true
# 設定生成描述的格式與內容
add_custom_instructions = """
請務必使用「繁體中文」進行回覆。
請依照以下格式產出 PR 摘要：
1. **改動類型**：標註 [新功能]、[修復 Bug]、[重構] 或 [文件更新]。
2. **主要變更**：用繁體中文條列式說明此 PR 做了什麼。
3. **規範檢查**：簡單說明是否符合專案的大小寫命名規範。
4. **影響範圍**：註明受影響的元件或模組路徑。
"""